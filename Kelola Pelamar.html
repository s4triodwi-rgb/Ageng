<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perekrutan Karyawan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">


</head>

<body style="margin: 0px; padding: 0px; height: 100%; ">
    <div class="d-flex">
        <div class="borderr p-2 text-white" style="width: 260px; min-height: 100vh; background-color: #161f30;">
            <div class="container">
                <div class="row">
                    <div class="col d-flex p-0" style="width: 10%;"><img style="width: 50px;" src="img/community.svg"
                            alt="">
                    </div>
                    <div class="col">Recruitment HRD</div>
                </div>
                <div class="row p-2">
                    <div class="col"><a href="index.html" class="pth fw-bolder">Home</a></div>
                </div>
                <div class="row p-2">
                    <div class="col"><a href="Kelola Pelamar.html" class="pth fw-bolder">Kelola Pelamar</a></div>
                </div>
                <div class="row p-2">
                    <div class="col"><a href="Info Loker.html" class="pth fw-bolder">Info Loker</a></div>
                </div>
                <div class="row p-2">
                    <div class="col"><a href="Seleksi Pelamar.html" class="pth fw-bolder">Seleksi</a></div>
                </div>
                <div class="row p-2">
                    <div class="col"><a href="Kontrak Kerja.html" class="pth fw-bolder">Kontrak Kerja</a></div>
                </div>
                <div class="row p-2">
                    <div class="col"><a href="" class="pth fw-bolder">Pemberitahuan </a></div>
                </div>
            </div>
        </div>

        <!-- main body -->
        <main id="main-content" style="padding: 20px" class="flex-grow-1 p-4">

            <div>
                <div class="d-flex justify-content-between align-items-center">
                    <h2>Kelola Pelamar</h2>
                    <span id="tanggal" class="text-secondary"></span>
                </div>
            </div>

            <div class="row g-3 mt-2 flex-nowrap justify-content-center text-center">
                <div class="col-md-3">
                    <div class="card shadow-sm p-2">
                        <a href="#forminputcontainer"
                            class="stretched-link text-decoration-none text-dark align-items-center"
                            data-bs-toggle="collapse" role="button" aria-expanded="false"
                            aria-controls="forminputcontainer">
                            <h2 class="fw-bold">+</h2>
                            <p class="mb-0 text-secondary">TESS</p>
                        </a>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card shadow-sm p-2">
                        <a href="#formdelete" class="stretched-link text-decoration-none text-dark align-items-center"
                            data-bs-toggle="collapse" role="button" aria-expanded="false" aria-controls="formdelete">
                            <h2 class="fw-bold">-</h2>
                            <p class="mb-0 text-secondary">Delete</p>
                        </a>
                    </div>
                </div>
            </div>
            <!-- form input -->
            <div class="collapse" id="forminputcontainer" data-bs-parent="#main-content">
                <form action="" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="formfoto" class="form-label">Upload Foto</label>
                        <input class="form-control" type="file" id="formfoto" required>
                    </div>
                    <div class="mb-3">
                        <label for="form-nama" class="form-label">Nama</label>
                        <input type="text" class="form-control" id="form-nama" placeholder="Masukkan Nama" required>
                    </div>
                    <div class="mb-3">
                        <label for="form-posisi" class="form-label">Posisi</label>
                        <input type="text" class="form-control" id="form-posisi" placeholder="Masukkan Posisi" required>
                    </div>
                    <div class="mb-3">
                        <label for="form-email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="form-email" placeholder="Masukkan Email" required>
                    </div>
                    <div class="mb-3">
                        <label for="form-alamat" class="form-label">Alamat</label>
                        <input type="text" class="form-control" id="form-alamat" placeholder="Masukkan Alamat" required>
                    </div>
                    <div class="mb-3">
                        <label for="formFile" class="form-label">Upload CV</label>
                        <input class="form-control" type="file" id="formFile" required>
                    </div>
                    <div class="col-12 mt-4 text-end">
                        <button type="button" class="btn btn-secondary me-2" data-bs-toggle="collapse"
                            data-bs-target="#forminputcontainer">Batal</button>
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </div>

                </form>
            </div>

            <!-- form delete -->
            <div class="collapse" id="formdelete" data-bs-parent="#main-content">
                <div class="mt-4 p-4 border rounded bg-light shadow-sm">
                    <form action="" method="post">
                        <div class="mb-3">
                            <label for="pilihPelamar" class="form-label">Pilih Pelamar yang Ingin Dihapus:</label>
                            <select class="form-select" id="pilihPelamar" name="id_pelamar" required>
                                <option value="" selected disabled>-- Pilih Nama Pelamar --</option>
                                <option value="1">Budi Santoso - [Web Developer]</option>
                                <option value="2">Siti Aminah - [UI/UX Designer]</option>
                                <option value="3">Ahmad Fauzi - [Project Manager]</option>
                                <option value="4">Rini Wulandari - [HR Specialist]</option>
                                <option value="5">Bayu Wardana - [Data Analyst]</option>
                            </select>
                        </div>
                        <div class="col-12 mt-4 text-end">
                            <button type="button" class="btn btn-secondary me-2" data-bs-toggle="collapse"
                                data-bs-target="#formdelete">Batal</button>
                            <button type="submit" class="btn btn-primary">Submit</button>
                        </div>
                    </form>
                </div>
            </div>

        </main>
    </div>

    <!-- bottom bar -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        const hariIni = new Date();

        document.getElementById("tanggal").innerHTML =
            hariIni.toLocaleDateString('id-ID', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
    </script>

</body>

</html>
