
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proses Kelulusan Pelamar</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4>Formulir Kelulusan Pelamar</h4>
        </div>
        <div class="card-body">
            <form action="proses_simpan.php" method="POST" enctype="multipart/form-data">
                
                <!-- Langkah 1: Pilih Calon Pelamar -->
                <div class="mb-3">
                    <label class="form-label">Pilih Calon Pelamar</label>
                    <select class="form-select" name="id_pelamar" required>
                        <option value="">-- Pilih Pelamar --</option>
                        <option value="1">Budi Santoso</option>
                        <option value="2">Siti Aminah</option>
                        <option value="3">Ahmad Fahri</option>
                    </select>
                </div>

                <!-- Langkah 2: Status Kelulusan -->
                <div class="mb-3">
                    <label class="form-label">Status Keputusan</label>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="status" value="lulus" id="lulus" checked>
                        <label class="form-check-label" for="lulus">Lulus</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="status" value="gagal" id="gagal">
                        <label class="form-check-label" for="gagal">Gagal</label>
                    </div>
                </div>

                <!-- Langkah 3: Upload Kontrak Kerja -->
                <div class="mb-3" id="fileKontrakArea">
                    <label class="form-label">Upload File Kontrak Kerja</label>
                    <input type="file" class="form-control" name="file_kontrak">
                </div>

                <button type="submit" class="btn btn-success">Simpan ke Database</button>
            </form>
        </div>
    </div>
</div>

<!-- Script untuk menyembunyikan input file jika status "Gagal" -->
<script>
    const statusRadios = document.querySelectorAll('input[name="status"]');
    const fileArea = document.getElementById('fileKontrakArea');

    statusRadios.forEach(radio => {
        radio.addEventListener('change', function() {
            if (this.value === 'gagal') {
                fileArea.style.display = 'none';
            } else {
                fileArea.style.display = 'block';
            }
        });
    });
</script>

</body>
</html>
