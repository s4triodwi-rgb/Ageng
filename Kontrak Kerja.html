<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perekrutan Karyawan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">

</head>

<body style="margin: 0px; padding: 0px; height: 100%; ">
    <div class="d-flex">
        <div class="borderr p-2 text-white d-print-none"
            style="width: 260px; min-height: 100vh; background-color: #161f30;">
            <div class="container">
                <div class="row">
                    <div class="col d-flex p-0" style="width: 10%;"><img style="width: 50px;" src="img/community.svg"
                            alt="">
                    </div>
                    <div class="col">Recruitment HRD</div>
                </div>
                <div class="row p-2">
                    <div class="col"><a href="index.html" class="pth fw-bolder">Home</a></div>
                </div>
                <div class="row p-2">
                    <div class="col"><a href="Kelola Pelamar.html" class="pth fw-bolder">Kelola Pelamar</a></div>
                </div>
                <div class="row p-2">
                    <div class="col"><a href="Info Loker.html" class="pth fw-bolder">Info Loker</a></div>
                </div>
                <div class="row p-2">
                    <div class="col"><a href="Seleksi Pelamar.html" class="pth fw-bolder">Seleksi</a></div>
                </div>
                <div class="row p-2">
                    <div class="col"><a href="Kontrak Kerja.html" class="pth fw-bolder">Kontrak Kerja</a></div>
                </div>
                <div class="row p-2">
                    <div class="col"><a href="" class="pth fw-bolder">Pemberitahuan </a></div>
                </div>
            </div>
        </div>

        <!-- main body -->
        <main id="main-content" style="padding: 20px" class="flex-grow-1 p-4">
            <div>
                <div class="d-flex justify-content-between align-items-center">
                    <h2>Kontrak Kerja</h2>
                    <span id="tanggal" class="text-secondary"></span>
                </div>
            </div>
            <!-- isi disini -->
            <div class="row g-3 mt-2 flex-nowrap justify-content-center text-center d-print-none">
                <div class="col-md-3">
                    <div class="card shadow-sm p-2">
                        <a href="#formbuatloker"
                            class="stretched-link text-decoration-none text-dark align-items-center"
                            data-bs-toggle="collapse" role="button" aria-expanded="false"
                            aria-controls="forminputcontainer">
                            <h2 class="fw-bold">+</h2>
                            <p class="mb-0 text-secondary">Membuat Kontrak Kerja</p>
                        </a>
                    </div>
                </div>
            </div>
            <div class="collapse" id="formbuatloker" data-bs-parent="#main-content">
                <div class="mt-4 p-4 border rounded bg-light shadow-sm">
                    <h5 class="mb-3 fw-bold">Formulir Kontrak Kerja</h5>
                    <form action="" method="post" enctype="multipart/form-data">
                        <!-- Bagian Data Pihak Pertama (Perusahaan) -->
                        <p class="fw-bold text-primary mb-2">PIHAK PERTAMA (PERUSAHAAN)</p>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label for="nama-hrd" class="form-label fw-medium">Nama Perwakilan HRD / Direksi</label>
                                <input type="text" class="form-control" id="nama-hrd"
                                    placeholder="Contoh: Andi Wijaya, S.Psi" required>
                            </div>
                            <div class="col-md-6">
                                <label for="jabatan-hrd" class="form-label fw-medium">Jabatan Perwakilan</label>
                                <input type="text" class="form-control" id="jabatan-hrd"
                                    placeholder="Contoh: HR Manager" required>
                            </div>
                        </div>

                        <!-- Bagian Data Pihak Kedua (Karyawan Baru) -->
                        <p class="fw-bold text-primary mb-2">PIHAK KEDUA (KARYAWAN)</p>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="nama-karyawan" class="form-label fw-medium">Nama Lengkap Karyawan</label>
                                <input type="text" class="form-control" id="nama-karyawan"
                                    placeholder="Masukkan nama pelamar yang lulus" required>
                            </div>
                            <div class="col-md-6">
                                <label for="nik-karyawan" class="form-label fw-medium">Nomor KTP / NIK</label>
                                <input type="text" class="form-control" id="nik-karyawan"
                                    placeholder="Contoh: 32150xxxxxxxxxxx" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="alamat-karyawan" class="form-label fw-medium">Alamat Sesuai KTP</label>
                            <input type="text" class="form-control" id="alamat-karyawan"
                                placeholder="Masukkan alamat lengkap" required>
                        </div>

                        <!-- Bagian Ketentuan Kerja -->
                        <p class="fw-bold text-primary mb-2">KETENTUAN & JABATAN KERJA</p>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="posisi-kerja" class="form-label fw-medium">Posisi Pekerjaan</label>
                                <input type="text" class="form-control" id="posisi-kerja"
                                    placeholder="Contoh: Frontend Developer" required>
                            </div>
                            <div class="col-md-6">
                                <label for="status-kerja" class="form-label fw-medium">Status Hubungan Kerja</label>
                                <select class="form-select" id="status-kerja" required>
                                    <option value="" disabled selected>-- Pilih Status --</option>
                                    <option value="Kontrak">Karyawan Kontrak (PKWT)</option>
                                    <option value="Tetap">Karyawan Tetap (PKWTT)</option>
                                    <option value="Magang">Magang (Internship)</option>
                                </select>
                            </div>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="durasi-kontrak" class="form-label fw-medium">Masa Berlaku Kontrak</label>
                                <input type="text" class="form-control" id="durasi-kontrak"
                                    placeholder="Contoh: 1 (Satu) Tahun" required>
                            </div>
                            <div class="col-md-6">
                                <label for="gaji-pokok" class="form-label fw-medium">Besaran Gaji Pokok (Rupiah)</label>
                                <input type="text" class="form-control" id="gaji-pokok"
                                    placeholder="Contoh: Rp 8.500.000" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="klausul-tambahan" class="form-label fw-medium">Klausul / Catatan Tambahan
                                Perjanjian</label>
                            <textarea class="form-control" id="klausul-tambahan" rows="3"
                                placeholder="Contoh: Bersedia mematuhi segala peraturan perusahaan yang berlaku tanpa terkecuali..."></textarea>
                        </div>
                        
                        <div class="col-12 mt-4 text-end d-print-none">
                            <button type="button" class="btn btn-secondary me-2" data-bs-toggle="collapse"
                                data-bs-target="#formbuatloker">Batal</button>
                            <button type="submit" onclick="window.print()" class="btn btn-success">Export</button>
                        </div>
                    </form>
                </div>
            </div>

        </main>
    </div>

    <!-- bottom bar -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        const hariIni = new Date();

        document.getElementById("tanggal").innerHTML =
            hariIni.toLocaleDateString('id-ID', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
    </script>

</body>

</html>
