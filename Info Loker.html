<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perekrutan Karyawan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">

</head>

<body style="margin: 0px; padding: 0px; height: 100%; ">
    <div class="d-flex">
        <div class="borderr p-2 text-white d-print-none"
            style="width: 260px; min-height: 100vh; background-color: #161f30;">
            <div class="container">
                <div class="row">
                    <div class="col d-flex p-0" style="width: 10%;"><img style="width: 50px;" src="img/community.svg"
                            alt="">
                    </div>
                    <div class="col">Recruitment HRD</div>
                </div>
                <div class="row p-2">
                    <div class="col"><a href="index.html" class="pth fw-bolder">Home</a></div>
                </div>
                <div class="row p-2">
                    <div class="col"><a href="Kelola Pelamar.html" class="pth fw-bolder">Kelola Pelamar</a></div>
                </div>
                <div class="row p-2">
                    <div class="col"><a href="Info Loker.html" class="pth fw-bolder">Info Loker</a></div>
                </div>
                <div class="row p-2">
                    <div class="col"><a href="Seleksi Pelamar.html" class="pth fw-bolder">Seleksi</a></div>
                </div>
                <div class="row p-2">
                    <div class="col"><a href="Kontrak Kerja.html" class="pth fw-bolder">Kontrak Kerja</a></div>
                </div>
                <div class="row p-2">
                    <div class="col"><a href="" class="pth fw-bolder">Pemberitahuan </a></div>
                </div>
            </div>
        </div>

        <!-- main body -->
        <main id="main-content" style="padding: 20px" class="flex-grow-1 p-4">
            <div>
                <div class="d-flex justify-content-between align-items-center">
                    <h2>Info Loker</h2>
                    <span id="tanggal" class="text-secondary"></span>
                </div>
            </div>
            <!-- isi disini -->
            <div class="row g-3 mt-2 flex-nowrap justify-content-center text-center d-print-none">
                <div class="col-md-3">
                    <div class="card shadow-sm p-2">
                        <a href="#formbuatloker"
                            class="stretched-link text-decoration-none text-dark align-items-center"
                            data-bs-toggle="collapse" role="button" aria-expanded="false"
                            aria-controls="forminputcontainer">
                            <h2 class="fw-bold">+</h2>
                            <p class="mb-0 text-secondary">Membuat info Loker</p>
                        </a>
                    </div>
                </div>
            </div>
            <div class="collapse" id="formbuatloker" data-bs-parent="#main-content">
                <div class="mt-4 p-4 border rounded bg-light shadow-sm">
                    <h5 class="mb-3 fw-bold">Formulir Lowongan Kerja Baru</h5>
                    <form action="" method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="form-posisi" class="form-label fw-medium">Nama Posisi / Jabatan</label>
                            <input type="text" class="form-control" id="form-posisi"
                                placeholder="Contoh: Frontend Developer" required>
                        </div>
                        <div class="mb-3">
                            <label for="form-perusahaan" class="form-label">Nama Perusahaan</label>
                            <input type="text" class="form-control" id="form-perusahaan" placeholder="Contoh: PT ABC"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="form-gaji" class="form-label">Estimasi Gaji</label>
                            <input type="text" class="form-control" id="form-gaji"
                                placeholder="Contoh: Rp 7.000.000 - Rp 10.000.000" required>
                        </div>
                        <div class="mb-3">
                            <label for="form-deskripsi" class="form-label">Deskripsi Pekerjaan</label>
                            <textarea class="form-control" id="form-deskripsi" rows="3"
                                placeholder="Masukkan ringkasan tugas pekerjaan..." required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="form-syarat" class="form-label">Persyaratan Kualifikasi</label>
                            <textarea class="form-control" id="form-syarat" rows="3"
                                placeholder="Contoh: Menguasai HTML, CSS, Bootstrap..." required></textarea>
                        </div>
                        <div class="col-12 mt-4 text-end d-print-none">
                            <button type="button" class="btn btn-secondary me-2" data-bs-toggle="collapse"
                                data-bs-target="#formbuatloker">Batal</button>
                            <button type="submit" onclick="window.print()" class="btn btn-success">Export</button>
                        </div>
                    </form>
                </div>
            </div>

        </main>
    </div>

    <!-- bottom bar -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        const hariIni = new Date();

        document.getElementById("tanggal").innerHTML =
            hariIni.toLocaleDateString('id-ID', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
    </script>

</body>

</html>
